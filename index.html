<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3E7B4F">
<link rel="icon" href="icon-192.png?v=4">
<link rel="apple-touch-icon" href="icon-512-maskable.png?v=4">
<title>иҫІе ҙйҖҹиЁҳ</title>
<style>
:root{
  --bg:#F2F4EE; --card:#FBFCF9; --ink:#2B3229; --sub:#77806F;
  --line:#DDE3D6; --accent:#3E7B4F; --accent-ink:#FFFFFF; --money:#C0492F;
  --out-bg:#243027; --out-ink:#DFEAD9;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1B211C; --card:#232B24; --ink:#E7ECE3; --sub:#94A08C;
    --line:#39443A; --accent:#6FBF85; --accent-ink:#1A241C; --money:#E88A72;
    --out-bg:#141A15; --out-ink:#CFE2C7; }
}
:root[data-theme="dark"]{ --bg:#1B211C; --card:#232B24; --ink:#E7ECE3; --sub:#94A08C;
  --line:#39443A; --accent:#6FBF85; --accent-ink:#1A241C; --money:#E88A72;
  --out-bg:#141A15; --out-ink:#CFE2C7; }
:root[data-theme="light"]{ --bg:#F2F4EE; --card:#FBFCF9; --ink:#2B3229; --sub:#77806F;
  --line:#DDE3D6; --accent:#3E7B4F; --accent-ink:#FFFFFF; --money:#C0492F;
  --out-bg:#243027; --out-ink:#DFEAD9; }
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:16px/1.6 system-ui,-apple-system,"PingFang TC","Noto Sans TC",sans-serif;}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 48px;display:flex;flex-direction:column;gap:14px}
header{display:flex;align-items:baseline;gap:10px}
h1{font-size:20px;font-weight:800;letter-spacing:.06em;margin:0}
header span{font-size:12px;color:var(--sub);letter-spacing:.12em}
textarea{width:100%;min-height:180px;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:10px;background:var(--card);color:var(--ink);font:14px/1.5 ui-monospace,Menlo,Consolas,monospace;
  resize:vertical}
textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
.row{display:flex;gap:10px}
button{flex:1;padding:12px 0;border:none;border-radius:10px;font-size:15px;font-weight:700;
  letter-spacing:.08em;cursor:pointer}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#go{background:var(--accent);color:var(--accent-ink)}
#clear{background:transparent;color:var(--sub);border:1.5px solid var(--line);flex:0 0 92px}
#outcard{display:none;background:var(--out-bg);color:var(--out-ink);border-radius:10px;padding:14px 14px 12px}
#out{margin:0;white-space:pre-wrap;word-break:break-all;
  font:14.5px/1.75 ui-monospace,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
#copy{margin-top:10px;background:var(--accent);color:var(--accent-ink)}
.hint{font-size:12.5px;color:var(--sub);margin:0}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>рҹҢҫ иҫІе ҙйҖҹиЁҳ</h1><span>зҖ§рҹҰҠж·өиҫІе ҙгғ»иІјдёҠеҚіеЈ“зё®</span></header>
  <textarea id="in" placeholder="жҠҠж”¶жҲҗе–®пјҸиҫІең’пјҸзү§е ҙпјҸйҺ®ж°‘зҙҖйҢ„зҡ„ж–Үеӯ—ж•ҙж®өиІјйҖІдҫҶпјҲеҸҜд»ҘдёҖж¬ЎиІјеҫҲеӨҡж®өпјү"></textarea>
  <div class="row">
    <button id="go">еЈ“зё®</button>
    <button id="clear">жё…з©ә</button>
  </div>
  <div id="outcard">
    <pre id="out"></pre>
    <div class="row"><button id="copy">иӨҮиЈҪзөҰиҖҒе…¬</button></div>
  </div>
  <p class="hint">ж”¶жҲҗжңғиҮӘеӢ•еҠ зёҪгҖҒеҸҜж”¶жҲҗзҡ„жҸ’йҡҠжҺ’жңҖеүҚгҖҒжҲҗзҶҹжҷӮй–“жңғжҺ’йҡҠгҖҒзү§е ҙеҲ—ж„ӣеҝғи·ҹдёӢдёҖд»Ҫз”ўзү©гҖҒй…’жЎ¶еҲ—й…Қж–№и·ҹзҶҹжҲҗгҖӮеҸӘиІјдёҖйғЁеҲҶд№ҹиЎҢгҖӮ</p>
</div>
<script>
const CROP={ "жңҲе…үиҳҝи””":"иҳҝи””","жҳҹеӯҗз•ӘиҢ„":"з•ӘиҢ„","ең“жңҲеҚ—з“ң":"еҚ—з“ң","еӨ•йҷҪиҠ’жһң":"иҠ’жһң","з¶ӯеЎ”жӢүиҠұ":"иҠұ","йҠҖз©—зЁ»":"зЁ»","ж—Ҙйңңи‘Ўиҗ„":"и‘Ўиҗ„","жңҲзүҷжў…":"жў…" };
const PROD={ "рҹҘҡ":"иӣӢ","рҹҘӣ":"еҘ¶","рҹ§¶":"з·ҡ","рҹҘ“":"еҹ№ж №","рҹ”Ҙ":"зҒ«","рҹӘ¶":"жҜӣ" };
function shortName(n){ n=n.trim(); for(const k in CROP){ if(n.includes(k)) return n.replace(k,CROP[k]); } return n; }
function fmtT(y,mo,d,hm){
  const now=new Date();
  const t=new Date(+y,mo-1,+d);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=Math.round((t-today)/86400000);
  if(diff===0) return hm;
  if(diff===1) return "жҳҺ"+hm;
  return (mo|0)+"/"+(d|0)+" "+hm;
}
function parse(txt){
  const S=[];
  // ---- ж”¶жҲҗ ----
  const hv=[]; let m;
  const reH=/ж”¶жҲҗ\s*\*{0,2}([^*пјҲ(\n]+?)\*{0,2}пјҲиҫІжңғж”¶иіјеғ№\s*(\d+)пјү/g;
  while((m=reH.exec(txt))) hv.push({name:shortName(m[1]),p:+m[2]});
  const mut=[];
  const reM=/рҹҢҹ[^\n]*?ж”¶жҲҗдәҶ\s*\*{0,2}([^*пјҲ(\n]+?)\*{0,2}[пјҲ(]/g;
  while((m=reM.exec(txt))) mut.push(m[1].trim());
  if(hv.length||mut.length){
    const g={};
    for(const h of hv){ const k=h.name+"пҪң"+h.p; g[k]=(g[k]||0)+1; }
    const parts=Object.entries(g).map(([k,n])=>{
      const [name,p]=k.split("пҪң");
      return name+p+(n>1?"Г—"+n:"");
    });
    const total=hv.reduce((a,h)=>a+h.p,0);
    let line="рҹ§ә "+parts.join("пјӢ")+(hv.length?"пјқ"+total:"");
    if(mut.length) line+=(hv.length?"пҪң":"")+"рҹҢҹ"+mut.join("гҖҒ")+"(з•ҷ)";
    S.push(line);
  }
  // ---- иҫІең’ ----
  const sortT=(a,b)=>{
    const w=s=>s.startsWith("жҳҺ")?"1"+s.slice(1):(/^\d+\//.test(s)?"2"+s:"0"+s);
    return w(a)<w(b)?-1:1;
  };
  const grp=g=>Object.entries(g).map(([c,n])=>c+(n>1?"Г—"+n:"")).join("+");
  const ready={};
  const reR=/пёҸвғЈ([^\nдёҖ-йҫҘ]{0,10})([дёҖ-йҫҘ]{2,8})\s*\n[^\n]{0,12}ж”¶жҲҗеәҰ[\s\S]{0,120}?еҸҜж”¶жҲҗ(?:[^\n]*?(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})\s*еүҚ)?/g;
  while((m=reR.exec(txt))){
    const t=m[3]?fmtT(m[3],+m[4],+m[5],m[6]):"";
    const c=shortName(m[2]);
    (ready[t]=ready[t]||{}); ready[t][c]=(ready[t][c]||0)+1;
  }
  const rk=Object.keys(ready);
  if(rk.length){
    rk.sort(sortT);
    S.push("вң… еҸҜж”¶ "+rk.map(t=>grp(ready[t])+(t?"пјҲ"+t+"еүҚпјү":"")).join("пҪң"));
  }
  const fields={};
  const reF=/пёҸвғЈ([^\nдёҖ-йҫҘ]{0,10})([дёҖ-йҫҘ]{2,8})\s*\n[^\n]{0,12}з”ҹй•·еәҰ[\s\S]{0,160}?й җиЁҲ\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})\s*жҲҗзҶҹ/g;
  while((m=reF.exec(txt))){
    if(m[2].includes("ж”¶жҲҗ")) continue;
    const t=fmtT(m[3],+m[4],+m[5],m[6]);
    const c=shortName(m[2]);
    (fields[t]=fields[t]||{}); fields[t][c]=(fields[t][c]||0)+1;
  }
  const fk=Object.keys(fields);
  if(fk.length){
    fk.sort(sortT);
    S.push("рҹҢұ "+fk.map(t=>t+" "+grp(fields[t])).join("пҪң"));
  }
  // ---- зү§е ҙж”¶жҲҗ ----
  const PROD2={ "жә«жіүиӣӢ":"иӣӢ","жҳҹе…үй®®д№і":"д№і","йӣІзөЁжҜӣз·ҡ":"з·ҡ","зҘһиҒ–зҒ«":"зҒ«" };
  const rc=[];
  const reC=/([дёҖ-йҫҘ]{2,6})\s*Г—\s*(\d+)\s*((?:пјҲ[^пјү]*пјү){1,2})/g;
  while((m=reC.exec(txt))){
    const parens=[...m[3].matchAll(/пјҲ([^пјү]*)пјү/g)].map(x=>x[1]);
    const animal=parens.find(p=>/^[дёҖ-йҫҘ]{1,6}$/.test(p));
    if(!animal) continue;
    const qual=parens.find(p=>/рҹ’Һ|вңЁ/.test(p));
    rc.push((PROD2[m[1]]||m[1])+"Г—"+m[2]
      +(qual?"("+qual.replace(/[гҖҒпјҒ\sГ—]/g,"")+")":""));
  }
  if(rc.length) S.push("рҹ§әрҹҗ® "+rc.join("пҪң"));
  // ---- й…’зӘ– ----
  const SUB={ "зі–еҢ…":"зі–","жә«жіүиӣӢ":"иӣӢ","жҳҹе…үй®®д№і":"д№і","зҙ”йҮҖ":"зҙ”" };
  const brews=[];
  const reW=/пёҸвғЈ([^\nдёҖ-йҫҘ]{0,10})([дёҖ-йҫҘ]{2,10})\s*(?:пјӢ\s*)?([^\nгғ»]{0,16}?)гғ»\s*(вҡЎ|рҹҢҷ|рҹҢ•)[^\n]{0,6}йҮҖ/g;
  while((m=reW.exec(txt))){
    const seg=txt.slice(m.index,m.index+260);
    if(!/зҷјй…өеәҰ|зҶҹжҲҗ|ж”ӘжӢҢ/.test(seg)) continue;
    const d=seg.match(/й җиЁҲ\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})\s*зҶҹжҲҗ/);
    let sub=m[3].trim();
    for(const k in SUB){ if(sub.includes(k)){ sub=SUB[k]; break; } }
    brews.push(shortName(m[2])+"+"+(sub||"зҙ”")+m[4]
      +(d?" "+fmtT(d[1],+d[2],+d[3],d[4]):"")
      +(/йӮ„жІ’ж”ӘжӢҢ/.test(seg)?"В·жңӘж”ӘрҹҘ„":""));
  }
  const emptyB=(txt.match(/пёҸвғЈ\s*рҹӣўпёҸ\s*з©әжЎ¶/g)||[]).length;
  if(brews.length||emptyB) S.push("рҹҚ¶ "+brews.join("пҪң")+(emptyB?(brews.length?"пҪң":"")+"з©әГ—"+emptyB:""));
  // ---- е“Ғи©•пјҲй–Ӣз“¶жҲ°е ұпјү----
  const revs=[];
  const reP=/рҹҸ…[^\n]*?(\d+)\s*еҲҶ[^\n]*?(зІ—йҮҖ|иүҜе“Ғ|жҘөе“Ғ|еӮідё–)([\s\S]{0,420}?)(?=рҹҸ…|$)/g;
  while((m=reP.exec(txt))){
    const seg=m[3];
    const named=/й…’иӯңзҝ»й–Ӣж–°зҡ„дёҖй Ғ/.test(seg);
    const wname=((seg.match(/рҹҚҫ\s*([^\nпјҲ(]+)/)||[])[1]||"").trim();
    const rc=(seg.match(/[пјҲ(][^пјҡ:\n]*[пјҡ:]([^пјү)\n]+)[пјү)]/)||[])[1]||"";
    const base=shortName((rc.match(/[дёҖ-йҫҘ]{2,10}/)||[])[0]||"?");
    let sub=(rc.match(/пјӢ\s*([^гғ»\n]+?)гғ»/)||[])[1]||"зҙ”";
    sub=sub.trim(); let hit=false;
    for(const k in SUB){ if(sub.includes(k)){ sub=SUB[k]; hit=true; break; } }
    if(!hit) sub=shortName((sub.match(/[дёҖ-йҫҘ]{2,10}/)||[])[0]||sub);
    const per=/йҷійҮҖ/.test(rc)?"рҹҢ•":(/ж…ўйҮҖ/.test(rc)?"рҹҢҷ":"вҡЎ");
    const pei=(seg.match(/й…Қж–№\s*(\d+)/)||[])[1];
    const price=(seg.match(/дј°еғ№\s*([\d,]+)/)||[])[1];
    revs.push((named?"рҹ“ң"+wname+"! ":(wname?wname+"В·":""))+base+"+"+sub+per+" "+m[1]+m[2][0]
      +(pei?"(ж–№"+pei+")":"")+(price?price+"е…ғ":""));
  }
  if(revs.length) S.push("рҹҸ… "+revs.join("пҪң"));
  // ---- зү§е ҙ ----
  const an=[];
  const reA=/еҗҚеӯ—пјҡ\*{0,2}([^*пјҲ(\n]+?)\*{0,2}пјҲ[^пјү]*пјү([\s\S]{0,260}?)(?=еҗҚеӯ—пјҡ|$)/g;
  while((m=reA.exec(txt))){
    const name=m[1].trim(), body=m[2];
    const lv=(body.match(/(\d+)\/10/)||[])[1];
    const hungry=/рҹҘә|жІ’йӨө|йӨ“/.test(body);
    const stock=body.match(/жҺЎж”¶еӯҳиІЁпҪң\s*(\S+)\s*Г—\s*(\d+)/);
    const nx=body.match(/дёӢдёҖд»Ҫ\s*(\S+)\s*й җиЁҲ\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})/);
    let piece=name+(lv?"вҷҘ"+lv:"");
    if(stock&&+stock[2]>0){
      piece+=" "+(PROD[stock[1]]||stock[1])+"Г—"+stock[2]+(+stock[2]>=3?"ж»ҝеҖү":"");
    }
    if(nx){ piece+=" дёӢ"+fmtT(nx[2],+nx[3],+nx[4],nx[5])+(stock&&+stock[2]>0?"":(PROD[nx[1]]||nx[1])); }
    if(hungry) piece+="рҹҘәжІ’йӨө";
    an.push(piece);
  }
  const fed=txt.match(/еҗғйЈҪзҡ„зӢҖж…Ӣз®ЎеҲ°\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})/);
  const fed2=txt.match(/пјҲ(\d{1,2}:\d{2})\s*еҫҢеҸҜд»ҘеҶҚйӨөпјү/);
  const fedTxt=fed?"пҪңрҹҚҪпёҸйӨөеҲ°"+fmtT(fed[1],+fed[2],+fed[3],fed[4]):(fed2?"пҪңрҹҚҪпёҸ"+fed2[1]+"еҫҢеҸҜйӨө":"");
  if(an.length) S.push("рҹҗ® "+an.join("пҪң")+fedTxt);
  // ---- иғҢеҢ…В·иҫІз”ўе“Ғ ----
  if(/рҹҺ’[^\n]*иҫІз”ўе“Ғ/.test(txt)){
    const bag={}, order=[];
    const reBag=/[рҹ“ҰрҹҚң]\s*\*{2}(вңЁиүҜе“Ғ|рҹ’ҺжҘөе“Ғ|йҖҸжҳҺзҡ„)?([дёҖ-йҫҘ]{2,8})\*{2}/g;
    while((m=reBag.exec(txt))){
      if(m[1]==="йҖҸжҳҺзҡ„") continue;
      const q=m[1]==="вңЁиүҜе“Ғ"?"вңЁ":(m[1]==="рҹ’ҺжҘөе“Ғ"?"рҹ’Һ":"");
      const n=shortName(m[2]);
      if(!bag[n]){ bag[n]={}; order.push(n); }
      bag[n][q]=(bag[n][q]||0)+1;
    }
    if(order.length){
      const parts=order.map(n=>{
        const b=bag[n], seg=[];
        if(b[""]) seg.push(""+b[""]);
        if(b["вңЁ"]) seg.push("вңЁ"+b["вңЁ"]);
        if(b["рҹ’Һ"]) seg.push("рҹ’Һ"+b["рҹ’Һ"]);
        return n+seg.join("");
      });
      S.push("рҹҺ’ "+parts.join("пҪң"));
    }
  }
  // ---- йҢўеҢ…пјҸз°ҪеҲ° ----
  const money=txt.match(/еӯҳж¬ҫ\s*\*{0,2}([\d,]+)\*{0,2}\s*з¶ӯеЎ”жӢүе№Ј/);
  const sign=txt.match(/йҖЈзәҢз°ҪеҲ°\s*\*{0,2}(\d+)\*{0,2}\s*еӨ©/);
  if(money||sign){
    let l="рҹ’ө ";
    if(money) l+=money[1];
    if(sign) l+=(money?"пҪң":"")+"з°ҪеҲ°"+sign[1]+"еӨ©";
    S.push(l);
  }
  // ---- й«”еҠӣзІҫеҠӣ ----
  const st=txt.match(/й«”еҠӣ\s*\[(\d+)\/\d+\][\s\S]{0,20}?зІҫеҠӣ\s*\[(\d+)\/\d+\]/);
  if(st) S.push("рҹӘҙ"+st[1]+" рҹ”Ӣ"+st[2]);
  return S.join("\n");
}
const $=id=>document.getElementById(id);
function run(){
  const r=parse($("in").value);
  $("outcard").style.display=r?"block":"none";
  $("out").textContent=r||"";
}
$("go").addEventListener("click",run);
$("in").addEventListener("paste",()=>setTimeout(run,60));
$("clear").addEventListener("click",()=>{ $("in").value=""; $("outcard").style.display="none"; });
$("copy").addEventListener("click",async()=>{
  const t=$("out").textContent;
  try{ await navigator.clipboard.writeText(t); }
  catch(e){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); ta.remove(); }
  $("copy").textContent="иӨҮиЈҪеҘҪдәҶ вң“";
  setTimeout(()=>$("copy").textContent="иӨҮиЈҪзөҰиҖҒе…¬",1500);
});
</script>

</body>
</html>
