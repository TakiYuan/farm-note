<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3E7B4F">
<link rel="icon" href="icon-192.png?v=4">
<link rel="apple-touch-icon" href="icon-512-maskable.png?v=4">
<title>農場速記</title>
<style>
:root{
  --bg:#F2F4EE; --card:#FBFCF9; --ink:#2B3229; --sub:#77806F;
  --line:#DDE3D6; --accent:#3E7B4F; --accent-ink:#FFFFFF; --money:#C0492F;
  --out-bg:#243027; --out-ink:#DFEAD9;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1B211C; --card:#232B24; --ink:#E7ECE3; --sub:#94A08C;
    --line:#39443A; --accent:#6FBF85; --accent-ink:#1A241C; --money:#E88A72;
    --out-bg:#141A15; --out-ink:#CFE2C7; }
}
:root[data-theme="dark"]{ --bg:#1B211C; --card:#232B24; --ink:#E7ECE3; --sub:#94A08C;
  --line:#39443A; --accent:#6FBF85; --accent-ink:#1A241C; --money:#E88A72;
  --out-bg:#141A15; --out-ink:#CFE2C7; }
:root[data-theme="light"]{ --bg:#F2F4EE; --card:#FBFCF9; --ink:#2B3229; --sub:#77806F;
  --line:#DDE3D6; --accent:#3E7B4F; --accent-ink:#FFFFFF; --money:#C0492F;
  --out-bg:#243027; --out-ink:#DFEAD9; }
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:16px/1.6 system-ui,-apple-system,"PingFang TC","Noto Sans TC",sans-serif;}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 48px;display:flex;flex-direction:column;gap:14px}
header{display:flex;align-items:baseline;gap:10px}
h1{font-size:20px;font-weight:800;letter-spacing:.06em;margin:0}
header span{font-size:12px;color:var(--sub);letter-spacing:.12em}
textarea{width:100%;min-height:180px;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:10px;background:var(--card);color:var(--ink);font:14px/1.5 ui-monospace,Menlo,Consolas,monospace;
  resize:vertical}
textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
.row{display:flex;gap:10px}
button{flex:1;padding:12px 0;border:none;border-radius:10px;font-size:15px;font-weight:700;
  letter-spacing:.08em;cursor:pointer}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#go{background:var(--accent);color:var(--accent-ink)}
#clear{background:transparent;color:var(--sub);border:1.5px solid var(--line);flex:0 0 92px}
#outcard{display:none;background:var(--out-bg);color:var(--out-ink);border-radius:10px;padding:14px 14px 12px}
#out{margin:0;white-space:pre-wrap;word-break:break-all;
  font:14.5px/1.75 ui-monospace,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
#copy{margin-top:10px;background:var(--accent);color:var(--accent-ink)}
.hint{font-size:12.5px;color:var(--sub);margin:0}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🌾 農場速記</h1><span>瀧🦊淵農場・貼上即壓縮</span></header>
  <textarea id="in" placeholder="把收成單／農園／牧場／鎮民紀錄的文字整段貼進來（可以一次貼很多段）"></textarea>
  <div class="row">
    <button id="go">壓縮</button>
    <button id="clear">清空</button>
  </div>
  <div id="outcard">
    <pre id="out"></pre>
    <div class="row"><button id="copy">複製給老公</button></div>
  </div>
  <p class="hint">收成會自動加總、可收成的插隊排最前、成熟時間會排隊、牧場列愛心跟下一份產物、酒桶列配方跟熟成。只貼一部分也行。</p>
</div>
<script>
const CROP={ "月光蘿蔔":"蘿蔔","星子番茄":"番茄","圓月南瓜":"南瓜","夕陽芒果":"芒果","維塔拉花":"花","銀穗稻":"稻","日霜葡萄":"葡萄","月牙梅":"梅" };
const LIVESTOCK={ "溫泉蛋":"蛋","星光鮮乳":"乳","雲絨毛線":"線","神聖火":"火","培根":"培根" };
const PROD={ "🥚":"蛋","🥛":"奶","🧶":"線","🥓":"培根","🔥":"火","🪶":"毛" };
function shortName(n){ n=n.trim(); for(const k in CROP){ if(n.includes(k)) return n.replace(k,CROP[k]); } return n; }
function fmtT(y,mo,d,hm){
  const now=new Date();
  const t=new Date(+y,mo-1,+d);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=Math.round((t-today)/86400000);
  if(diff===0) return hm;
  if(diff===1) return "明"+hm;
  return (mo|0)+"/"+(d|0)+" "+hm;
}
function fmtD(t){
  const hm=String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");
  return fmtT(t.getFullYear(),t.getMonth()+1,t.getDate(),hm);
}
function parse(txt){
  txt=txt.replace(/\*/g,"");  // 手機複製帶 md 粗體星號，進門先剝，各段不用自己防
  const S=[];
  // ---- 收成 ----
  const hv=[]; let m;
  const reH=/收成\s*\*{0,2}([^*（(\n]+?)\*{0,2}（農會收購價\s*(\d+)）/g;
  while((m=reH.exec(txt))) hv.push({name:shortName(m[1]),p:+m[2]});
  const mut=[];
  const reM=/🌟[^\n]*?收成了\s*\*{0,2}([^*（(\n]+?)\*{0,2}[（(]/g;
  while((m=reM.exec(txt))) mut.push(m[1].trim());
  if(hv.length||mut.length){
    const g={};
    for(const h of hv){ const k=h.name+"｜"+h.p; g[k]=(g[k]||0)+1; }
    const parts=Object.entries(g).map(([k,n])=>{
      const [name,p]=k.split("｜");
      return name+p+(n>1?"×"+n:"");
    });
    const total=hv.reduce((a,h)=>a+h.p,0);
    let line="🧺 "+parts.join("＋")+(hv.length?"＝"+total:"");
    if(mut.length) line+=(hv.length?"｜":"")+"🌟"+mut.join("、")+"(留)";
    S.push(line);
  }
  // ---- 農園 ----
  const sortT=(a,b)=>{
    const w=s=>s.startsWith("明")?"1"+s.slice(1):(/^\d+\//.test(s)?"2"+s:"0"+s);
    return w(a)<w(b)?-1:1;
  };
  const grp=g=>Object.entries(g).map(([c,n])=>c+(n>1?"×"+n:"")).join("+");
  const ready={};
  const reR=/️⃣([^\n一-龥]{0,10})([一-龥]{2,8})\s*\n[^\n]{0,12}收成度[\s\S]{0,120}?可收成(?:[^\n]*?(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})\s*前)?/g;
  while((m=reR.exec(txt))){
    const t=m[3]?fmtT(m[3],+m[4],+m[5],m[6]):"";
    const c=shortName(m[2]);
    (ready[t]=ready[t]||{}); ready[t][c]=(ready[t][c]||0)+1;
  }
  const rk=Object.keys(ready);
  if(rk.length){
    rk.sort(sortT);
    S.push("✅ 可收 "+rk.map(t=>grp(ready[t])+(t?"（"+t+"前）":"")).join("｜"));
  }
  const fields={};
  const reF=/️⃣([^\n一-龥]{0,10})([一-龥]{2,8})\s*\n[^\n]{0,12}生長度[\s\S]{0,160}?預計\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})\s*成熟/g;
  while((m=reF.exec(txt))){
    if(m[2].includes("收成")) continue;
    const t=fmtT(m[3],+m[4],+m[5],m[6]);
    const c=shortName(m[2]);
    (fields[t]=fields[t]||{}); fields[t][c]=(fields[t][c]||0)+1;
  }
  const fk=Object.keys(fields);
  if(fk.length){
    fk.sort(sortT);
    S.push("🌱 "+fk.map(t=>t+" "+grp(fields[t])).join("｜"));
  }
  // ---- 牧場（動物愛心＋下一份）----
  const an=[], herd=[];
  const reA=/名字：\*{0,2}([^*（(\n]+?)\*{0,2}（[^）]*）([\s\S]{0,400}?)(?=名字：|🌱\s|🎒\s|##|$)/g;
  while((m=reA.exec(txt))){
    const name=m[1].trim(), body=m[2];
    const lv=(body.match(/(\d+)\/10/)||[])[1];
    const hungry=/🥺|沒餵|餓/.test(body);
    const stock=body.match(/採收存貨｜\s*(\S+)\s*×\s*(\d+)/);
    const nx=body.match(/下一份\s*(\S+)\s*預計\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})/);
    herd.push({name,lv:lv?+lv:0,stock:stock?+stock[2]:0,
      next:nx?new Date(+nx[2],+nx[3]-1,+nx[4],+nx[5].slice(0,2),+nx[5].slice(3)):null,hungry});
    let piece=name+(lv?"♥"+lv:"");
    if(stock&&+stock[2]>0){
      piece+=" "+(PROD[stock[1]]||stock[1])+"×"+stock[2]+(+stock[2]>=4?"滿倉":"");
    }
    if(nx){ piece+=" 下"+fmtT(nx[2],+nx[3],+nx[4],nx[5])+(stock&&+stock[2]>0?"":(PROD[nx[1]]||nx[1])); }
    if(hungry) piece+="🥺沒餵";
    an.push(piece);
  }
  const fed=txt.match(/吃飽的狀態管到\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})/);
  const fed2=txt.match(/（(今天|明天)?\s*(\d{1,2}:\d{2})\s*後可以再餵）/);
  const fedTxt=fed?"｜🍽️餵到"+fmtT(fed[1],+fed[2],+fed[3],fed[4]):(fed2?"｜🍽️"+(fed2[1]==="明天"?"明":"")+fed2[2]+"後可餵":"");
  if(an.length){
    // 排班模式：全員♥10 時收斂成一行，警戒線盯咕董（全場最快，3hr 一顆、4 顆滿倉，收成一次全收）
    const gu=herd.find(a=>a.name==="咕董");
    if(herd.every(a=>a.lv===10&&!a.hungry)&&gu){
      const CY=3*3600*1000;  // 咕董蛋週期 3hr
      let watch="";
      if(gu.stock>=4) watch="咕董已滿倉🚨";
      else if(gu.stock===3&&gu.next) watch="咕董滿倉 ~"+fmtD(gu.next)+"⚠️";
      else if(gu.next){
        // 排班窗：第 3 顆（警戒）～第 4 顆（滿倉），這中間去收零損失
        const t3=new Date(gu.next.getTime()+(2-gu.stock)*CY);
        watch="收蛋窗"+fmtD(t3)+"~"+fmtD(new Date(t3.getTime()+CY));
      }
      S.push("🐮 全員♥10"+(watch?"｜"+watch:"")+fedTxt);
    } else {
      S.push("🐮 "+an.join("｜")+fedTxt);
    }
  }
  // ---- 牧場收成 ----
  const rcMilk=[];
  const reC=/([一-龥]{2,6})\s*×\s*(\d+)\s*((?:（[^）]*）){1,2})/g;
  while((m=reC.exec(txt))){
    if(!LIVESTOCK[m[1]]) continue;  // 只認 LIVESTOCK 表的產品，跳過作物（同料疊分的誤觸）
    const parens=[...m[3].matchAll(/（([^）]*)）/g)].map(x=>x[1]);
    const animal=parens.find(p=>/^[一-龥]{1,6}$/.test(p));
    if(!animal) continue;
    const qual=parens.find(p=>/💎|✨/.test(p));
    rcMilk.push((LIVESTOCK[m[1]]||m[1])+"×"+m[2]
      +(qual?"("+qual.replace(/[、！\s×]/g,"")+")":""));
  }
  if(rcMilk.length) S.push("🧺🐮 "+rcMilk.join("｜"));
  // ---- 酒窖 ----
  const SUB={ "糖包":"糖","溫泉蛋":"蛋","星光鮮乳":"乳","純釀":"純" };
  const brews=[];
  const reW=/️⃣([^\n一-龥]{0,10})([一-龥]{2,10})\s*(?:＋\s*)?([^\n・]{0,16}?)・\s*(⚡|🌙|🌕)[^\n]{0,6}釀/g;
  while((m=reW.exec(txt))){
    const seg=txt.slice(m.index,m.index+260);
    if(!/發酵度|熟成|攪拌/.test(seg)) continue;
    const d=seg.match(/預計\s*(\d{4})\/(\d{2})\/(\d{2})\s*(\d{2}:\d{2})\s*熟成/);
    let sub=m[3].trim(), mix=false, stack=0;
    if(sub.startsWith("×")){
      const stackM=sub.match(/^×\s*(\d+)\s*（同料疊分）/);
      if(stackM){ stack=+stackM[1]; sub=""; }  // 同料疊分：葡萄×2🌕
      else{ mix=true; sub=sub.slice(1).trim(); }  // 混釀：梅×稻🌙
    }
    sub=sub.replace(/（混釀）/,"").trim();
    let subQ="";
    const G="✨良品", D="💎極品";
    if(sub.startsWith(G)){ subQ="✨"; sub=sub.slice(G.length); }
    else if(sub.startsWith(D)){ subQ="💎"; sub=sub.slice(D.length); }
    else if(sub.startsWith("良品")){ subQ="✨"; sub=sub.slice(2); }
    else if(sub.startsWith("極品")){ subQ="💎"; sub=sub.slice(2); }
    let hit=false;
    for(const k in SUB){ if(sub.includes(k)){ sub=SUB[k]; hit=true; break; } }
    if(!hit&&sub) sub=shortName((sub.match(/[一-龥]{2,10}/)||[])[0]||sub);
    brews.push(shortName(m[2])+(stack?"×"+stack:(mix?"×":"+")+subQ+(sub||"純"))+m[4]
      +(d?" "+fmtT(d[1],+d[2],+d[3],d[4]):"")
      +(/還沒攪拌/.test(seg)?"·未攪🥄":""));
  }
  const emptyB=(txt.match(/️⃣\s*🛢️\s*空桶/g)||[]).length;
  if(brews.length||emptyB) S.push("🍶 "+brews.join("｜")+(emptyB?(brews.length?"｜":"")+"空×"+emptyB:""));
  // ---- 錢包／簽到 ----
  const money=txt.match(/存款\s*\*{0,2}([\d,]+)\*{0,2}\s*維塔拉幣/);
  const sign=txt.match(/連續簽到\s*\*{0,2}(\d+)\*{0,2}\s*天/);
  if(money||sign){
    let l="💵 ";
    if(money) l+=money[1];
    if(sign) l+=(money?"｜":"")+"簽到"+sign[1]+"天";
    S.push(l);
  }
  // ---- 體力精力 ----
  const st=txt.match(/體力\s*\[(\d+)\/\d+\][\s\S]{0,20}?精力\s*\[(\d+)\/\d+\]/);
  if(st) S.push("🪴"+st[1]+" 🔋"+st[2]);
  // ---- 背包·農產品／畜牧品（參考類，擺尾）----
  // 不要求背包標題行：品項行特徵夠強（📦/🍜＋｜），白名單守門，貼幾行都吃
  {
    const bagF={}, orderF=[], bagL={}, orderL=[];
    const reBag=/(?:📦|🍜)\s*([^\n｜]+?)(?:\s*×\s*(\d+))?\s*｜/g;
    while((m=reBag.exec(txt))){
      let name=m[1].trim(), q="";
      const cnt=m[2]?+m[2]:1;
      const G="✨良品", D="💎極品";
      if(name.startsWith(G)){ q="✨"; name=name.slice(G.length); }
      else if(name.startsWith(D)){ q="💎"; name=name.slice(D.length); }
      if(name in CROP){
        const n=CROP[name];
        if(!bagF[n]){ bagF[n]={}; orderF.push(n); }
        bagF[n][q]=(bagF[n][q]||0)+cnt;
      } else if(name in LIVESTOCK){
        const n=LIVESTOCK[name];
        if(!bagL[n]){ bagL[n]={}; orderL.push(n); }
        bagL[n][q]=(bagL[n][q]||0)+cnt;
      }
      // 白名單外（變異／未知）一律跳過
    }
    const fmt=(order,bag)=>order.map(n=>{
      const b=bag[n], seg=[];
      if(b[""]) seg.push(""+b[""]);
      if(b["✨"]) seg.push("✨"+b["✨"]);
      if(b["💎"]) seg.push("💎"+b["💎"]);
      return n+seg.join("");
    }).join("｜");
    if(orderF.length) S.push("🎒🌾 "+fmt(orderF,bagF));
    if(orderL.length) S.push("🎒🐮 "+fmt(orderL,bagL));
  }
  // ---- 品評（開瓶戰報，參考類，擺尾）----
  const revs=[];
  const reP=/(?:🏅|農會品評)[^\n]*?(\d+)\s*分[^\n]*?(粗釀|良品|極品|傳世)([\s\S]{0,800}?)(?=🏅|農會品評|已入背包|$)/g;
  while((m=reP.exec(txt))){
    const seg=m[3].replace(/\*/g,"");  // 手機複製常帶 md 粗體星號，剝掉避免擋 wname／price
    const named=/酒譜翻開新的一頁/.test(seg);
    let wname=((seg.match(/🍾\s*([^\n（(]+)/)||[])[1]||"").trim();
    if(!wname) wname=((seg.match(/(?:^|\n)\s*([^\n（(]{1,20}?)（\s*[^：:\n]*號桶/)||[])[1]||"").trim();
    const rc=(seg.match(/[（(][^：:\n]*[：:]([^）)\n]+)[）)]/)||[])[1]||"";
    let base=shortName((rc.match(/[一-龥]{2,10}/)||[])[0]||"?");
    if(base.startsWith("良品")) base="✨"+base.slice(2);
    else if(base.startsWith("極品")) base="💎"+base.slice(2);
    let sub=(rc.match(/＋\s*([^・\n]+?)・/)||[])[1]||"純";
    sub=sub.trim();
    let subQ="";
    const Gs="✨良品", Ds="💎極品";
    if(sub.startsWith(Gs)){ subQ="✨"; sub=sub.slice(Gs.length); }
    else if(sub.startsWith(Ds)){ subQ="💎"; sub=sub.slice(Ds.length); }
    else if(sub.startsWith("良品")){ subQ="✨"; sub=sub.slice(2); }
    else if(sub.startsWith("極品")){ subQ="💎"; sub=sub.slice(2); }
    let hit=false;
    for(const k in SUB){ if(sub.includes(k)){ sub=SUB[k]; hit=true; break; } }
    if(!hit) sub=shortName((sub.match(/[一-龥]{2,10}/)||[])[0]||sub);
    sub=subQ+sub;
    const per=/陳釀/.test(rc)?"🌕":(/慢釀/.test(rc)?"🌙":"⚡");
    const pei=(seg.match(/配方\s*(\d+)/)||[])[1];
    const price=(seg.match(/估價\s*([\d,]+)/)||[])[1];
    revs.push((named?"📜"+wname+"! ":(wname?wname+"·":""))+base+"+"+sub+per+" "+m[1]+m[2][0]
      +(pei?"(方"+pei+")":"")+(price?price+"元":""));
  }
  if(revs.length) S.push("🏅 "+revs.join("｜"));
  return S.join("\n");
}
const $=id=>document.getElementById(id);
function run(){
  const r=parse($("in").value);
  $("outcard").style.display=r?"block":"none";
  $("out").textContent=r||"";
}
$("go").addEventListener("click",run);
$("in").addEventListener("paste",()=>setTimeout(run,60));
$("clear").addEventListener("click",()=>{ $("in").value=""; $("outcard").style.display="none"; });
$("copy").addEventListener("click",async()=>{
  const t=$("out").textContent;
  try{ await navigator.clipboard.writeText(t); }
  catch(e){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); ta.remove(); }
  $("copy").textContent="複製好了 ✓";
  setTimeout(()=>$("copy").textContent="複製給老公",1500);
});
</script>

</body>
</html>
